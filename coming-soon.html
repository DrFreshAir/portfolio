<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — Travis Cantrell</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('fonts/SuisseIntl-Regular.woff2') format('woff2'),
           url('fonts/SuisseIntl-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #1E1E1E;
      font-family: 'Suisse Intl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .back:hover {
      color: #F5F2EE;
    }

    .label {
      font-size: 15px;
      font-weight: 400;
      color: #F5F2EE;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Back</a>
  <p class="label">Coming Soon</p>

</body>
</html>
