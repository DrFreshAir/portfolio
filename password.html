<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protected — Travis Cantrell</title>
  <style>
    @font-face {
      font-family: 'Suisse Intl';
      src: url('fonts/SuisseIntl-Regular.woff2') format('woff2'),
           url('fonts/SuisseIntl-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #1E1E1E;
      font-family: 'Suisse Intl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 320px;
      padding: 24px;
    }

    .gate__label {
      font-size: 13px;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.2px;
    }

    .gate__input {
      width: 100%;
      background: #272727;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      color: #F5F2EE;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .gate__input::placeholder {
      color: #555;
    }

    .gate__input:focus {
      border-color: #555;
    }

    .gate__submit {
      width: 100%;
      background: #D4822A;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .gate__submit:hover {
      opacity: 0.88;
    }

    .gate__error {
      font-size: 12px;
      color: #E05252;
      display: none;
    }

    .gate__error--visible {
      display: block;
    }
  </style>
</head>
<body>

  <div class="gate">
    <p class="gate__label">This project is password protected</p>
    <input type="password" class="gate__input" id="passwordInput" placeholder="Enter password">
    <button class="gate__submit" id="submitBtn">Submit</button>
    <p class="gate__error" id="errorMsg">Incorrect password</p>
  </div>

  <script>
    const input = document.getElementById('passwordInput');
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('errorMsg');

    function attempt() {
      if (input.value === 'Travis2026') {
        window.location.href = 'quality-investigation-agent.html';
      } else {
        error.classList.add('gate__error--visible');
        input.focus();
      }
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attempt();
    });

    input.addEventListener('input', function() {
      error.classList.remove('gate__error--visible');
    });
  </script>

</body>
</html>
